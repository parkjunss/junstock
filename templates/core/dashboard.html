{% extends 'base.html' %}

{% block content %}
<div class="container-fluid py-4">
    <h2 class="mb-4">대시보드 요약</h2>

    <div class="row mb-4">
        <div class="col-md-3">
            <div class="card text-white bg-primary shadow">
                <div class="card-body">
                    <h6>총 매출</h6>
                    <h3>$24,500</h3>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-white bg-success shadow">
                <div class="card-body">
                    <h6>새로운 유저</h6>
                    <h3>156 명</h3>
                </div>
            </div>
        </div>
        </div>

    <div class="row mb-4">
        <div class="col-12">
            <div class="card shadow">
                <div class="card-header">월별 트래픽 추이</div>
                <div class="card-body">
                    <canvas id="mainChart" style="height: 300px;"></canvas>
                </div>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-lg-8">
            <div class="card shadow">
                <div class="card-header">최근 활동 내역</div>
                <div class="table-responsive">
                    <table class="table align-items-center table-flush">
                        <thead class="thead-light">
                            <tr>
                                <th>프로젝트명</th>
                                <th>상태</th>
                                <th>진행률</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for item in recent_items %}
                            <tr>
                                <td>{{ item.name }}</td>
                                <td>{{ item.status }}</td>
                                <td>{{ item.progress }}%</td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
