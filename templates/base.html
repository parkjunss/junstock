    <title>Stockview</title>

    <link rel="icon" href="{% static './favicon.ico' %}">

    {% block extra_css %}{% endblock %}


    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="text-white font-sans">

    <div class="flex h-screen">
        <!-- 좌측 내비게이션 바 -->

        {% include "nav.html" %}


        <!-- 메인 콘텐츠 영역 -->
        <main class="main flex-1 flex flex-col">
            <!-- 상단 헤더 -->
            <header class="header border-b border-blue-500 p-4 flex justify-between items-center">
                <div class="w-1/3">
                    <div class="relative">
                        <span class="absolute left-3 top-2 text-gray-400"><i class="fas fa-search"></i></span>
                        <input type="text" placeholder="Search" class="card-bg rounded-full w-full py-2 pl-10 pr-4 focus:outline-none">
                    </div>
                </div>
                <!-- <div class="flex items-center space-x-4">
                    <button class="text-gray-400 hover:text-white"><i class="fas fa-sun"></i></button>
                    <button class="text-gray-400 hover:text-white"><i class="fas fa-moon"></i></button>
                    {# Django의 user 객체를 통해 인증 상태 확인 #}
                    {% if user.is_authenticated %}
                        {# --- 1. 로그인한 사용자에게 보여줄 내용 --- #}
                        <span class="text-white hidden md:block">안녕하세요, {{ user.username }}님!</span>

                        <a href="#" class="text-gray-400 hover:text-white" title="마이페이지">
                            <i class="fas fa-user-circle fa-2x"></i>
                        </a>

                        <a href="{% url 'account_logout' %}" class="text-gray-400 hover:text-white font-semibold">Logout</a>

                    {% else %}
                        {# --- 2. 로그인하지 않은 사용자(익명 사용자)에게 보여줄 내용 --- #}

                        <a href="{% url 'account_login' %}" class="text-gray-400 hover:text-white font-semibold">Login</a>

                        <a href="{% url 'account_signup' %}" class="text-gray-400 hover:text-white font-semibold">SignIn</a>

                    {% endif %}
                </div> -->
            </header>

            <!-- 페이지별 콘텐츠가 들어갈 부분 -->
            <div class="flex-1 p-6 overflow-y-auto">
                {% block content %}
                <!-- dashboard.html의 내용이 여기에 삽입됩니다. -->
                {% endblock %}
            </div>
        </main>
    </div>

    <!-- JS 파일 (차트 라이브러리 등) -->
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        const sidebar = document.querySelector('.sidebar');
        const toggler = document.querySelector('.sidebar-toggler');

        // 토글러가 존재하는 경우에만 이벤트 리스너 추가
        if (toggler) {
            toggler.addEventListener('click', function() {
                // 사이드바에 'is-open' 클래스를 토글 (추가/제거)
                sidebar.classList.toggle('is-open');
                // 토글러 아이콘에 'active' 클래스를 토글 (X 모양 애니메이션)
                this.classList.toggle('active');
            });
        }
    });
    </script>

    {% block scripts %}
    {% endblock %}
</body>
</html>
